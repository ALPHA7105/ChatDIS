<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatDIS Widget</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Syne:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>

        :root{
        
        --primary:#971721;
        --primary-dark:#860404;
        --primary-soft:rgba(151,23,33,0.12);
        
        --chat-bg:#faf4f4;
        
        --bot-bg:#860404;
        --bot-text:#ffffff;
        
        --user-bg:#e5e5e5;
        --user-text:#111;
        
        --input-bg:#ffffff;
        --input-text:#1e1e1f;
        
        --send-btn:#971721;
        
        --text-main:#1c1c1c;
        --text-muted:#6b6b6b;
        
        --border-soft:#e4dede;
        
        }
        
        *,
        *::before,
        *::after{
        margin:0;
        padding:0;
        box-sizing:border-box;
        }
        
        html,body{
        height:100%;
        overflow:hidden;
        background:transparent;
        font-family:'Syne',sans-serif;
        color:var(--text-main);
        }
        
        #w{
        width:100%;
        height:100%;
        display:flex;
        flex-direction:column;
        background:var(--chat-bg);
        position:relative;
        overflow:hidden;
        }
        
        /* HEADER */
        
        .hd{
        background:var(--primary);
        color:white;
        padding:22px 24px 20px;
        position:relative;
        z-index:10;
        flex-shrink:0;
        border-bottom:1px solid rgba(255,255,255,0.12);
        }
        
        /* remove decorative stars */
        .hd-geo{
        display:none;
        }
        
        .hd-logo{
        display:flex;
        align-items:baseline;
        gap:2px;
        margin-bottom:6px;
        }
        
        .hd-chat{
        font-family:'Cormorant',serif;
        font-weight:700;
        font-size:2rem;
        color:#ffffff;
        line-height:1;
        }
        
        .hd-dis{
        font-family:'Cormorant',serif;
        font-style:italic;
        font-weight:400;
        font-size:2rem;
        color:#ffd9d9;
        line-height:1;
        }
        
        .hd-sub{
        font-size:0.62rem;
        font-weight:500;
        letter-spacing:2.5px;
        text-transform:uppercase;
        color:#f1eaea;
        }
        
        .hd-status{
        display:flex;
        align-items:center;
        gap:7px;
        margin-top:10px;
        }
        
        .hd-dot{
        width:6px;
        height:6px;
        border-radius:50%;
        background:#52D98A;
        box-shadow:0 0 6px #52D98A;
        animation:dotpulse 2.4s ease-in-out infinite;
        }
        
        .hd-dot-label{
        font-size:0.62rem;
        color:#f3eaea;
        }
        
        @keyframes dotpulse{
        0%,100%{opacity:1}
        50%{opacity:.35}
        }
        
        /* MESSAGES */
        
        .msgs{
        flex:1;
        overflow-y:auto;
        padding:20px 18px 10px;
        display:flex;
        flex-direction:column;
        gap:12px;
        scroll-behavior:smooth;
        }
        
        .msg{
        max-width:86%;
        font-size:0.82rem;
        line-height:1.6;
        animation:msgin .35s ease;
        }
        
        @keyframes msgin{
        from{opacity:0;transform:translateY(10px)}
        to{opacity:1;transform:translateY(0)}
        }
        
        .msg-bot{
        align-self:flex-start;
        background:var(--bot-bg);
        color:var(--bot-text);
        padding:12px 15px;
        border-radius:8px;
        }
        
        .msg-user{
        align-self:flex-end;
        background:var(--user-bg);
        color:var(--user-text);
        padding:12px 15px;
        border-radius:8px;
        }
        
        /* divider */
        
        .divider{
        display:flex;
        align-items:center;
        gap:10px;
        font-size:.58rem;
        letter-spacing:2px;
        text-transform:uppercase;
        color:#777;
        }
        
        .divider::before,
        .divider::after{
        content:'';
        flex:1;
        height:1px;
        background:#e0dcdc;
        }
        
        /* QUICK BUTTONS */
        
        .quick{
        padding:8px 18px 6px;
        display:flex;
        gap:6px;
        flex-wrap:wrap;
        flex-shrink:0;
        }
        
        .quick-btn{
        background:white;
        border:1px solid var(--border-soft);
        color:var(--text-main);
        padding:6px 14px;
        border-radius:4px;
        cursor:pointer;
        font-family:'Syne',sans-serif;
        font-size:.63rem;
        font-weight:500;
        letter-spacing:.8px;
        text-transform:uppercase;
        transition:all .18s ease;
        position:relative;
        overflow:hidden;
        }
        
        .quick-btn:hover{
        background:var(--primary);
        border-color:var(--primary);
        color:white;
        }
        
        /* INPUT */
        
        .input-wrap{
        padding:10px 18px 14px;
        background:var(--chat-bg);
        border-top:1px solid var(--border-soft);
        display:flex;
        gap:10px;
        align-items:flex-end;
        flex-shrink:0;
        }
        
        .input-field{
        flex:1;
        padding:10px 14px;
        border:1px solid var(--border-soft);
        border-radius:6px;
        outline:none;
        font-family:'Syne',sans-serif;
        font-size:.8rem;
        color:var(--input-text);
        background:var(--input-bg);
        resize:none;
        min-height:40px;
        max-height:96px;
        line-height:1.5;
        transition:border-color .2s,box-shadow .2s;
        }
        
        .input-field::placeholder{
        color:#8a8a8a;
        }
        
        .input-field:focus{
        border-color:var(--primary);
        box-shadow:0 0 0 2px rgba(151,23,33,.15);
        }
        
        /* SEND BUTTON */
        
        .send-btn{
        width:40px;
        height:40px;
        border:none;
        border-radius:8px;
        background:var(--send-btn);
        color:white;
        cursor:pointer;
        display:flex;
        align-items:center;
        justify-content:center;
        flex-shrink:0;
        transition:background .18s ease,transform .08s ease;
        }
        
        .send-btn:hover{
        background:var(--primary-dark);
        }
        
        .send-btn:active{
        transform:scale(.95);
        }
        
        .send-btn svg{
        width:16px;
        height:16px;
        }
        
        .send-btn:disabled{
        opacity:.4;
        cursor:not-allowed;
        }
        
        /* FOOTER */
        
        .ft{
        text-align:center;
        padding:5px 0 7px;
        font-size:.56rem;
        letter-spacing:2px;
        text-transform:uppercase;
        color:#888;
        }

        /* Thinking animation */

        .thinking {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .thinking .dots {
            display: inline-flex;
            gap: 4px;
        }
        
        .thinking .dots span {
            width: 6px;
            height: 6px;
            background: var(--dis-primary);
            border-radius: 50%;
            display: inline-block;
            animation: thinkingBounce 1.3s infinite ease-in-out;
        }
        
        .thinking .dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .thinking .dots span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes thinkingBounce {
            0%, 80%, 100% {
                transform: translateY(0);
                opacity: 0.35;
            }
            40% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }
        
    </style>
    
</head>

<body>
    <div id="w">

        <div class="hd">
            <div class="hd-geo"></div>
            <div class="hd-logo">
                <span class="hd-chat">Chat</span><span class="hd-dis">DIS</span>
            </div>
            <div class="hd-sub">Dunes International School &middot; Abu Dhabi</div>
            <div class="hd-status">
                <div class="hd-dot"></div>
                <div class="hd-dot-label">Online &mdash; ready to assist</div>
            </div>
            <div class="hd-rule"></div>
        </div>

        <div class="msgs" id="msgs">
            <div class="divider">Today</div>
            <div class="msg msg-bot">
                Welcome to <strong>Dunes International School</strong>. I'm ChatDIS &mdash; ask me about timings, fees,
                admissions, uniforms, or any school policy.
            </div>
        </div>

        <div class="quick" id="quick">
            <button class="quick-btn" onclick="quickAsk('What are the school timings?')"><span>Timings</span></button>
            <button class="quick-btn" onclick="quickAsk('Show me the fee structure')"><span>Fees</span></button>
            <button class="quick-btn"
                onclick="quickAsk('What documents are needed for admission?')"><span>Admission</span></button>
            <button class="quick-btn" onclick="quickAsk('How can I contact the school?')"><span>Contact</span></button>
        </div>

        <div class="input-wrap">
            <textarea id="inp" class="input-field" placeholder="Ask anything about DIS…" rows="1"></textarea>
            <button class="send-btn" id="send-btn" onclick="send()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>

        <div class="ft">made by the students of dis</div>
    </div>

    <script>
        const API_URL = window.CHATDIS_API_URL || '/ask';
        const msgs = document.getElementById('msgs');
        const inp = document.getElementById('inp');
        const sendBtn = document.getElementById('send-btn');
        const quickEl = document.getElementById('quick');
        let loading = false;

        inp.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 96) + 'px';
        });

        inp.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
        });

        function addMsg(content, isUser, isThinking) {
            const el = document.createElement('div');
            el.className = 'msg ' + (isUser ? 'msg-user' : 'msg-bot');

            if (isThinking) {
                el.classList.add('msg-thinking');
                el.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
            } else if (isUser) {
                el.textContent = content;
            } else {
                el.innerHTML = marked.parse(content);
            }

            msgs.appendChild(el);
            msgs.scrollTop = msgs.scrollHeight;
            return el;
        }

        async function send() {
            if (loading) return;
            const q = inp.value.trim();
            if (!q) return;

            inp.value = '';
            inp.style.height = 'auto';
            if (quickEl) quickEl.style.display = 'none';

            addMsg(q, true);
            loading = true;
            sendBtn.disabled = true;
            const thinking = addMsg('', false, true);

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: q })
                });
                const data = await res.json();
                thinking.classList.remove('msg-thinking');
                thinking.innerHTML = marked.parse(data.answer || data.error || 'No response received.');
            } catch {
                thinking.classList.remove('msg-thinking');
                thinking.innerHTML = 'Connection issue &mdash; please try again shortly.';
            }

            loading = false;
            sendBtn.disabled = false;
            msgs.scrollTop = msgs.scrollHeight;
        }

        function quickAsk(text) { inp.value = text; send(); }
    </script>
</body>

</html>
